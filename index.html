<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>thinkgrid</title>
  <body>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.body.innerHTML = '<div style="background:red;color:white;padding:20px;font-size:18px;position:fixed;top:0;left:0;right:0;z-index:9999;"><h3>SCRIPT ERROR</h3><p>' + msg + '</p><p>' + url + ':' + lineNo + ':' + columnNo + '</p></div>';
        return false;
      };
      window.addEventListener("unhandledrejection", function(event) {
        document.body.innerHTML = '<div style="background:red;color:white;padding:20px;font-size:18px;position:fixed;top:0;left:0;right:0;z-index:9999;"><h3>UNHANDLED PROMISE</h3><p>' + event.reason + '</p></div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
